# CI: run the backend invariant suite and build the frontend on every push/PR.
#
# The database service is MariaDB, not MySQL, on purpose: the schema files use
# MariaDB's `ADD COLUMN IF NOT EXISTS` / `CREATE INDEX IF NOT EXISTS` guards
# (development runs on XAMPP = MariaDB), and plain MySQL 8 rejects that syntax.
# A MySQL service here would fail the suite for reasons that have nothing to do
# with the change under test.
#
# The test suite provisions its own scratch schemas (ifqm_test_*) and drops
# them — see backend/test/helpers.js — so it only needs a root connection.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "yes"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=12

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run invariant suite
        working-directory: backend
        run: npm test
        env:
          MASTER_DB_HOST: 127.0.0.1
          MASTER_DB_USER: root
          MASTER_DB_PASS: ""

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
